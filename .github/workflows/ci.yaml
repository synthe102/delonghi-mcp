name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv python install 3.13

      - run: uv sync --all-groups

      - run: uv run ruff check

      - run: uv run ty check

      - run: uv run pytest -v
