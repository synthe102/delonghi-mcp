# Known property name mappings for De'Longhi Eletta Explore (ECAM450.55.G)
#
# These are PLACEHOLDERS. After intercepting Coffee Link app traffic,
# replace with the actual Ayla property names and remove the PLACEHOLDER_ prefix.
#
# Use the get_device_status tool to discover actual property names.

[mappings]
power = "PLACEHOLDER_POWER"
machine_status = "PLACEHOLDER_STATUS"
water_level = "PLACEHOLDER_WATER_LEVEL"
bean_container = "PLACEHOLDER_BEAN_LEVEL"
drip_tray = "PLACEHOLDER_DRIP_TRAY"
error_code = "PLACEHOLDER_ERROR"
temperature = "PLACEHOLDER_TEMP"
descale_needed = "PLACEHOLDER_DESCALE"
brew_count = "PLACEHOLDER_BREW_COUNT"
